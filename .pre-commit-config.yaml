ci:
  autoupdate_schedule: quarterly
  skip: [mypy]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-format
        exclude: ^docs/.*
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --show-fixes]
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # Runs the `mypy` on PATH (installed via `pip install -e .[dev]`,
        # see setup.cfg) rather than pre-commit's isolated mypy mirror,
        # so it picks up the project's actual runtime dependencies for
        # accurate type resolution.
        entry: mypy
        args: [--pretty, --config-file=pyproject.toml, surfaces_tools/]
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
        exclude: >-
          (?x)^( docs/.*| tests/.*| )$
